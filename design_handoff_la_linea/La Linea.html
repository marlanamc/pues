<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Línea · Pues</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#1b1712"/>
    <line x1="22" y1="50" x2="48" y2="50" stroke="#d39a48" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="42" x2="52" y2="58" stroke="#5fa37e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="50" x2="78" y2="50" stroke="#6e9bc9" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="40" cy="50" r="4" fill="#dd6a43"/>
    <text x="50" y="76" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#efe5d2">La Línea</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="linea-shared.jsx"></script>
<script type="text/babel" src="linea-content.jsx"></script>
<script type="text/babel" src="linea-game.jsx"></script>
<script type="text/babel" src="linea-directions.jsx"></script>

<script type="text/babel">
const { createRoot } = ReactDOM;
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
const { LineaGame, DirDiagram, DirSentence, DirLedger, StampLegend, StampGuide } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="flow" title="La Línea — el recorrido"
        subtitle="Juego interactivo. Empieza en la pestaña Práctica, abre La Línea, elige un modo y juega. (Toca para probarlo.)">
        <DCArtboard id="play" label="Interactivo · Práctica → modo → jugar → resultados" width={300} height={640}>
          <LineaGame />
        </DCArtboard>
      </DCSection>

      <DCSection id="main" title="Pantalla principal · 3 direcciones"
        subtitle="Tres maneras de componer «Leer la línea»: el dibujo manda, la frase manda, o nota al margen.">
        <DCArtboard id="a" label="A · Diagrama arriba" width={300} height={640}><DirDiagram /></DCArtboard>
        <DCArtboard id="b" label="B · La frase primero" width={300} height={640}><DirSentence /></DCArtboard>
        <DCArtboard id="c" label="C · Cuaderno (nota al margen)" width={300} height={640}><DirLedger /></DCArtboard>
        <DCPostIt top={-8} right={-150} width={150} rotate={2}>El color = cuándo. La forma = qué tipo de acción.</DCPostIt>
      </DCSection>

      <DCSection id="stamps" title="Los sellos · adaptados al español"
        subtitle="El set original (punto/línea/arco) más dos sellos nuevos para lo que el inglés no tiene: subjuntivo y condicional.">
        <DCArtboard id="legend" label="Stamp set" width={760} height={636} style={{ background: "#f1e7d4" }}><StampLegend /></DCArtboard>
      </DCSection>

      <DCSection id="guide" title="Guía de sellos · el sistema completo"
        subtitle="La referencia profunda: cada sello con sus formas por zona, ejemplos y la regla clave que evita confusiones.">
        <DCArtboard id="guide" label="Guía de sellos" width={820} height={1610} style={{ background: "#f1e7d4" }}><StampGuide /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
